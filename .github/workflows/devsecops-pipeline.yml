name: SecureFlow DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  hello-world:
    name: Pipeline Skeleton Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm pipeline is running
        run: echo "SecureFlow DevSecOps pipeline skeleton is working"

  gitleaks:
    name: Stage 1 - Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks full history scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
        with:
          args: detect --source . --log-opts="--all" --report-format json --report-path gitleaks-report.json --exit-code 1