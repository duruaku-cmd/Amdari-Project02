name: SecureFlow DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  hello-world:
    name: Pipeline Skeleton Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm pipeline is running
        run: echo "SecureFlow DevSecOps pipeline skeleton is working"

  gitleaks:
    name: Stage 1 - Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Confirm files exist
        run: |
          pwd
          ls -la
          echo "Checking docker-compose secrets:"
          grep -nEi "POSTGRES_PASSWORD|DB_PASSWORD|JWT_SECRET|SESSION_SECRET" docker-compose.yml || true
          echo "Checking Gitleaks config:"
          cat .gitleaks.toml

      - name: Run Gitleaks with Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source="/repo" \
            --config="/repo/.gitleaks.toml" \
            --no-git \
            --redact=false \
            --report-format=json \
            --report-path="/repo/gitleaks-report.json" \
            --exit-code=1

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json