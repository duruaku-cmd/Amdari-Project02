name: SecureFlow DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  hello-world:
    name: Pipeline Skeleton Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm pipeline is running
        run: echo "SecureFlow DevSecOps pipeline skeleton is working"
  gitleaks:
    name: Stage 1 - Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Gitleaks full-history scan
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="--all" \
            --report-format json \
            --report-path gitleaks-report.json

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json