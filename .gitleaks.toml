title = "SecureFlow Custom Gitleaks Rules"

[[rules]]
id = "secureflow-postgres-password"
description = "Detect POSTGRES_PASSWORD in YAML or env format"
regex = '''(?i)POSTGRES_PASSWORD\s*[:=]\s*["']?([A-Za-z0-9_\-@!#$%^&*]+)["']?'''
secretGroup = 1

