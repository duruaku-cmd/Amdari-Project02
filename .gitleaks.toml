title = "SecureFlow Custom Gitleaks Rules"

[[rules]]
id = "secureflow-hardcoded-env-secret"
description = "Detect SecureFlow hardcoded environment secrets"
regex = '''(?i)(POSTGRES_PASSWORD|DB_PASSWORD|JWT_SECRET|SESSION_SECRET|SECRET_KEY)\s*=\s*[^ \n\r]+'''
secretGroup = 0

[[rules]]
id = "secureflow-aws-access-key"
description = "Detect AWS access key IDs"
regex = '''AKIA[0-9A-Z]{16}'''
secretGroup = 0